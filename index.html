<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absensi Web</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #e0e5ec;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background-color: #e0e5ec;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 20px 20px 60px #bebebe, -20px -20px 60px #ffffff;
            width: 100%;
            max-width: 450px;
            transform-style: preserve-3d;
            transition: transform 0.3s ease;
        }
        .container:hover {
            transform: translateY(-5px);
        }
        h2 {
            text-align: center;
            color: #333333;
            margin-bottom: 8px;
            font-weight: 700;
            text-shadow: 1px 1px 2px #ffffff, -1px -1px 2px #c5d0db;
        }
        p.subtitle {
            text-align: center;
            color: #777777;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .datetime-display {
            text-align: center;
            color: #007bff;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 25px;
            padding: 12px;
            background: #e0e5ec;
            border-radius: 10px;
            box-shadow: inset 6px 6px 12px #c5d0db, inset -6px -6px 12px #ffffff;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555555;
            font-weight: 600;
            font-size: 14px;
        }
        input[type="text"], select {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            background-color: #e0e5ec;
            box-shadow: inset 6px 6px 12px #c5d0db, inset -6px -6px 12px #ffffff;
            transition: all 0.3s ease;
        }
        input[type="text"]:focus, select:focus {
            outline: none;
            box-shadow: inset 2px 2px 5px #c5d0db, inset -2px -2px 5px #ffffff;
        }
        #nama, #unit {
            background-color: #f0f4f8; 
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: #e0e5ec;
            color: #333333;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 6px 6px 12px #c5d0db, -6px -6px 12px #ffffff;
            transition: all 0.2s ease;
            margin-top: 10px;
        }
        .btn-submit:hover {
            box-shadow: 2px 2px 5px #c5d0db, -2px -2px 5px #ffffff;
            transform: scale(0.99);
        }
        .btn-submit:active {
            box-shadow: inset 4px 4px 8px #c5d0db, inset -4px -4px 8px #ffffff;
        }
        .btn-submit:disabled {
            box-shadow: none;
            background-color: #d1d8e0;
            color: #a4b0be;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2><b>FORM ABSENSI</b></h2>
    <p class="subtitle">Silakan isi data presensi Anda hari ini</p>
    <div id="datetime" class="datetime-display">Memuat tanggal...</div>
    
    <form id="absenForm">
        <input type="hidden" id="tanggal_kirim" name="tanggal_kirim">

        <div class="form-group">
            <label for="personal_number">Personal Number</label>
            <input type="text" id="personal_number" name="personal_number" placeholder="Contoh: 12345678" maxlength="8" required>
        </div>

        <div class="form-group">
            <label for="nama">Nama Lengkap</label>
            <input type="text" id="nama" name="nama" placeholder="Nama akan muncul otomatis" required readonly>
        </div>

        <div class="form-group">
            <label for="unit">Nama Unit</label>
            <input type="text" id="unit" name="unit" placeholder="Unit akan muncul otomatis" required readonly>
        </div>

        <button type="submit" id="submitBtn" class="btn-submit">Kirim Absensi</button>
    </form>
</div>

        const formattedDateTime = now.toLocaleString('id-ID', options);
        document.getElementById('datetime').innerHTML = formattedDateTime;
        
        // Simpan juga teks tanggal ke input hidden agar bisa ikut terkirim ke spreadsheet
        document.getElementById('tanggal_kirim').value = formattedDateTime;

    const personalNumberInput = document.getElementById('personal_number');
    const namaInput = document.getElementById('nama');
    const unitInput = document.getElementById('unit');

    personalNumberInput.addEventListener('input', function() {
        const value = this.value;
        if (value.length === 8) {
            const employeeData = employeeDatabase[value];
            if (employeeData) {
                namaInput.value = employeeData.nama;
                unitInput.value = employeeData.unit;
            } else {
                namaInput.value = "PERSONAL NUMBER TIDAK DITEMUKAN";
                unitInput.value = "";
            }
        } else {
            namaInput.value = "";
            unitInput.value = "";
        }
    });

    const scriptURL = 'https://script.google.com/macros/s/AKfycbypSjE5ZUECOZXOfz9sWwTLHt9a3SKgNdnToW_KkfaHiiaLcSI0L7wX3ddP8uM8vxi4Ng/exec'; 
    const form = document.getElementById('absenForm');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', e => {
        e.preventDefault();

        submitBtn.disabled = true;
        submitBtn.innerHTML = 'Mengirim data...';

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                alert('Absensi Berhasil Terkirim!');
                form.reset();
                namaInput.value = "";
                unitInput.value = "";
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Kirim Absensi';
                updateClock();
            })
            .catch(error => {
                alert('Gagal mengirim absensi. Silakan coba lagi.');
                console.error('Error!', error.message);
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Kirim Absensi';
            });
    });
</script>

</body>
</html>
