<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absensi Web</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #0056a3; /* Mengubah background dasar menjadi Biru Nusantara */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background-color: #0056a3; /* Mengubah background form menjadi Biru Nusantara */
            padding: 40px;
            border-radius: 20px;
            /* Menyesuaikan bayangan agar efek Neumorphism tetap kontras di atas warna biru */
            box-shadow: 20px 20px 60px #00427d, -20px -20px 60px #006ae9;
            width: 100%;
            max-width: 450px;
            transform-style: preserve-3d;
            transition: transform 0.3s ease;
        }
        .container:hover {
            transform: translateY(-5px);
        }
        h2 {
            text-align: center;
            color: #ffffff; /* Mengubah text judul jadi putih */
            margin-bottom: 8px;
            font-weight: bold;
            text-transform: uppercase;
            text-shadow: 1px 1px 2px #003366;
        }
        p.subtitle {
            text-align: center;
            color: #d0e1f9; /* Mengubah teks subtitle jadi biru muda terang */
            font-size: 14px;
            margin-bottom: 10px;
        }
        .datetime-display {
            text-align: center;
            color: #007bff;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 25px;
            padding: 12px;
            background: #e0e5ec;
            border-radius: 10px;
            box-shadow: inset 6px 6px 12px #c5d0db, inset -6px -6px 12px #ffffff;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #ffffff; /* Mengubah warna label menjadi PUTIH TEGAS */
            font-weight: 600;
            font-size: 14px;
            text-shadow: 1px 1px 2px #003366; /* Memberikan bayangan tipis agar teks lebih menonjol */
        }
        input[type="text"], select {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            background-color: #0056a3;
            color: #ffffff; /* Mengubah teks ketikan user jadi putih */
            box-shadow: inset 6px 6px 12px #00427d, inset -6px -6px 12px #006ae9;
            transition: all 0.3s ease;
        }
        /* Agar tulisan placeholder (contoh: Nama akan muncul otomatis) berwarna agak terang */
        input::placeholder {
            color: #a3c7ee;
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: #e0e5ec;
            color: #333333;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 6px 6px 12px #c5d0db, -6px -6px 12px #ffffff;
            transition: all 0.2s ease;
            margin-top: 10px;
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: #0076de; /* Warna biru yang lebih cerah agar menonjol */
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            position: relative;
            transition: all 0.1s ease;
            margin-top: 10px;
            
            /* EFEK 3D: Membuat efek tebal di bawah tombol */
            box-shadow: 0 6px 0 #004685, 0 12px 20px rgba(0, 0, 0, 0.3);
        }
        .btn-submit:hover {
            background-color: #1c88ea;
            /* Mempertahankan ketebalan saat kursor di atas tombol */
            box-shadow: 0 6px 0 #004685, 0 14px 25px rgba(0, 0, 0, 0.35);
        }

        .btn-submit:active {
            /* EFEK DITEKAN: Tombol turun ke bawah sejauh 4px */
            transform: translateY(4px);
            /* Ketebalan bawah menipis menjadi 2px memberi impresi benar-benar amblas */
            box-shadow: 0 2px 0 #004685, 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .btn-submit:disabled {
            background-color: #5c8bba;
            color: #d0e1f9;
            box-shadow: 0 4px 0 #3a5c80;
            cursor: not-allowed;
            transform: translateY(2px);
        }
    </style>
</head>
<body>

<div class="container">
    <h2><b>FORM ABSENSI</b></h2>
    <p class="subtitle">Silakan isi data presensi Anda hari ini</p>
    <div id="datetime" class="datetime-display">Memuat tanggal...</div>
    
    <form id="absenForm">
        <input type="hidden" id="tanggal_kirim" name="tanggal_kirim">

        <div class="form-group">
            <label for="personal_number">Personal Number</label>
            <input type="text" id="personal_number" name="personal_number" placeholder="Contoh: 12345678" maxlength="8" required>
        </div>

        <div class="form-group">
            <label for="nama">Nama Lengkap</label>
            <input type="text" id="nama" name="nama" placeholder="Nama akan muncul otomatis" required readonly>
        </div>

        <div class="form-group">
            <label for="unit">Nama Unit</label>
            <input type="text" id="unit" name="unit" placeholder="Unit akan muncul otomatis" required readonly>
        </div>

        <div class="form-group">
            <label for="pembinaan">Pembinaan</label>
            <select id="pembinaan" name="pembinaan" required>
                <option value="" disabled selected>-- Pilih Jenis Pembinaan --</option>
                <option value="Produktivitas">Produktivitas</option>
                <option value="Kualitas">Kualitas</option>
            </select>
        </div>

        <button type="submit" id="submitBtn" class="btn-submit">Kirim Absensi</button>
    </form>
</div>

    const personalNumberInput = document.getElementById('personal_number');
    const namaInput = document.getElementById('nama');
    const unitInput = document.getElementById('unit');

    personalNumberInput.addEventListener('input', function() {
        const value = this.value;
        if (value.length === 8) {
            const employeeData = employeeDatabase[value];
            if (employeeData) {
                namaInput.value = employeeData.nama;
                unitInput.value = employeeData.unit;
            } else {
                namaInput.value = "PERSONAL NUMBER TIDAK DITEMUKAN";
                unitInput.value = "";
            }
        } else {
            namaInput.value = "";
            unitInput.value = "";
        }
    });

    // MASUKKAN SCRIPT URL WEB APP ANDA DI SINI
    const scriptURL = 'https://script.google.com/macros/s/AKfycbypSjE5ZUECOZXOfz9sWwTLHt9a3SKgNdnToW_KkfaHiiaLcSI0L7wX3ddP8uM8vxi4Ng/exec'; 
    const form = document.getElementById('absenForm');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', e => {
        e.preventDefault();

        submitBtn.disabled = true;
        submitBtn.innerHTML = 'Mengirim data...';

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                alert('Absensi Berhasil Terkirim!');
                form.reset();
                namaInput.value = "";
                unitInput.value = "";
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Kirim Absensi';
                updateClock();
            })
            .catch(error => {
                alert('Gagal mengirim absensi. Silakan coba lagi.');
                console.error('Error!', error.message);
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Kirim Absensi';
            });
    });
</script>

</html>
